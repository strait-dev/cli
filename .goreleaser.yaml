version: 2

project_name: strait

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/strait
    binary: strait
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: strait-dev
    name: cli

homebrew_casks:
  - repository:
      owner: strait-dev
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: strait-bot
      email: bot@strait.dev
    binaries:
      - strait
    homepage: https://github.com/strait-dev/cli
    description: "Strait CLI -- manage jobs, runs, and workflows"
