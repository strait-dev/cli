version: "2"

linters:
  default: none
  enable:
    - dupword
    - durationcheck
    - errcheck
    - errorlint
    - exhaustive
    - gocritic
    - godot
    - gosec
    - govet
    - ineffassign
    - misspell
    - modernize
    - nilnil
    - nilerr
    - nolintlint
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - wastedassign

  settings:
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id

    gocritic:
      disabled-checks:
        - ifElseChain

    gosec:
      excludes:
        - G117
        - G703
        - G704
        - G706

    godot:
      scope: toplevel

    govet:
      disable:
        - fieldalignment

    exhaustive:
      default-signifies-exhaustive: true

  exclusions:
    warn-unused: true
    presets:
      - comments
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam
          - revive
          - nilnil
      - linters:
          - gosec
        text: "taint analysis|G117"
      - linters:
          - nilnil
        path: internal/config/

formatters:
  enable:
    - gofmt
    - goimports
