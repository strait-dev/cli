name: Release

on:
  release:
    types: [created]

permissions: {}

env:
  GOPRIVATE: github.com/strait-dev/*

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure access to private strait-go module
        env:
          SDK_ACCESS_TOKEN: ${{ secrets.SDK_ACCESS_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${SDK_ACCESS_TOKEN}@github.com/strait-dev/".insteadOf "https://github.com/strait-dev/"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
