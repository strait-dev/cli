name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOPRIVATE: github.com/strait-dev/*

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure access to private strait-go module
        env:
          SDK_ACCESS_TOKEN: ${{ secrets.SDK_ACCESS_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${SDK_ACCESS_TOKEN}@github.com/strait-dev/".insteadOf "https://github.com/strait-dev/"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure access to private strait-go module
        env:
          SDK_ACCESS_TOKEN: ${{ secrets.SDK_ACCESS_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${SDK_ACCESS_TOKEN}@github.com/strait-dev/".insteadOf "https://github.com/strait-dev/"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4

  goreleaser:
    name: GoReleaser Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure access to private strait-go module
        env:
          SDK_ACCESS_TOKEN: ${{ secrets.SDK_ACCESS_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${SDK_ACCESS_TOKEN}@github.com/strait-dev/".insteadOf "https://github.com/strait-dev/"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: GoReleaser Check
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          args: check
