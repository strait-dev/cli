name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOPRIVATE: github.com/strait-dev/*

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure access to private strait-go module
        env:
          SDK_ACCESS_TOKEN: ${{ secrets.SDK_ACCESS_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${SDK_ACCESS_TOKEN}@github.com/strait-dev/".insteadOf "https://github.com/strait-dev/"

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure access to private strait-go module
        env:
          SDK_ACCESS_TOKEN: ${{ secrets.SDK_ACCESS_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${SDK_ACCESS_TOKEN}@github.com/strait-dev/".insteadOf "https://github.com/strait-dev/"

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.11.4

  goreleaser:
    name: GoReleaser Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure access to private strait-go module
        env:
          SDK_ACCESS_TOKEN: ${{ secrets.SDK_ACCESS_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${SDK_ACCESS_TOKEN}@github.com/strait-dev/".insteadOf "https://github.com/strait-dev/"

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: GoReleaser Check
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          args: check
